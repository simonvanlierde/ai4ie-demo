<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="AI4IE">
  <title>AI4IE</title>
  <!-- Standalone pivot mark: the Æ glyph on its own. Darker copper draws the A's
       left leg + the E's arms; lighter copper completes the 4 (stem + diagonal +
       crossbar). Transparent background — for light or neutral surfaces. -->
  <path d="M10.9 19 L5.5 28 M19.9 4 L26.5 4 M19.9 28 L26.5 28"
        fill="none" stroke="#b5541e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M19.9 4 L19.9 28 M19.9 4 L10.9 19 L25.3 19"
        fill="none" stroke="#e0895a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
