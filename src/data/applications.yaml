# AI applications in industrial ecology, rendered by the explorer on the
# applications-map page. One entry per application; tags come from
# src/data/tags.ts (both dimensions required), papers[] reference ids in
# literature.yaml. See CONTRIBUTING.md for how to add an entry.

# ── LCA & footprinting ───────────────────────────────────────────────────────
- id: impact-screening-ml
  name: "Rapid impact screening with tabular ML"
  ie: [lca]
  ml: [tabular-ml]
  summary: "Train regression/ANN models on existing characterization results to screen chemicals or products orders of magnitude faster than full assessment."
  maturity: "Repeatedly demonstrated since 2017; screening-grade accuracy, not a replacement for characterization."
  papers: [songRapidLifeCycleImpact2017, ghoroghiAdvancesApplicationMachine2022, romeikoReviewMachineLearning2024]
- id: lci-gap-filling
  name: "Inventory gap-filling & estimation"
  ie: [lca]
  ml: [tabular-ml]
  summary: "Estimate missing life-cycle inventory values from similar processes and product attributes instead of leaving gaps or copying proxies."
  maturity: "Active research area; method choice matters more than model class, and extrapolation beyond training data stays risky."
  papers: [zargarReviewInventoryModeling2022, gkousisMachineLearningLarge2026]
- id: llm-lci-extraction
  name: "LLM extraction of LCI data from literature"
  ie: [lca]
  ml: [llm, nlp-extraction]
  summary: "Fine-tuned or retrieval-augmented LLMs pull inventory and impact data out of papers, reports, and MSDS into structured databases."
  maturity: "Working systems exist (F1 ≈ 0.82–0.86); consensus is extraction with human verification — never generation of missing data."
  papers: [kumarLargeLanguageModelbased2025, preussLargeLanguageModels2024, tuMitigatingGrandChallenges2024]
- id: automated-carbon-footprinting
  name: "Automated product carbon footprinting"
  ie: [lca]
  ml: [llm, nlp-extraction]
  summary: "Match products to emission factors semantically (zero-shot or LLM-driven) to produce carbon footprints at catalog scale."
  maturity: "Deployed at company scale for common products; accuracy drops off the beaten track, and audit trails remain the weak point."
  papers: [balajiFlamingoEnvironmentalImpact2023, dengAutoPCFEfficientProduct2023]
- id: corporate-report-extraction
  name: "Sustainability-indicator extraction from corporate reports"
  ie: [lca]
  ml: [nlp-extraction, llm]
  summary: "Extract quantitative ESG/ESRS indicators from thousands of corporate reports at once, turning PDF piles into analyzable panels."
  maturity: "Corpus-scale extraction validated in 2026; the binding constraint is what companies disclose, not the model."
  papers: [forsterExtractingSustainabilityIndicators2026]
- id: household-consumption-modeling
  name: "Household consumption-footprint modeling"
  ie: [lca]
  ml: [tabular-ml]
  summary: "Cluster household microdata and link archetypes to environmental extensions for regionalized, bottom-up consumption footprints."
  maturity: "Demonstrated at national scale; depends on rich household microdata that most countries don't have."
  papers: [froemeltMachineLearningBased2020]

# ── MFA & stocks and flows ───────────────────────────────────────────────────
- id: satellite-stock-mapping
  name: "Material stock mapping from satellite data"
  ie: [mfa]
  ml: [remote-sensing]
  summary: "Combine Earth-observation imagery, OSM, and material intensities to map building/infrastructure stocks without cadastral data."
  maturity: "National 10 m maps and a global 90 m estimate exist; validation spreads of 53–200% against independent studies set the accuracy ceiling."
  papers: [haberlHighResolutionMaps2021, haberlGlobalBuiltEnvironment2024]
- id: nightlights-stock-proxy
  name: "Night-lights & multi-source stock estimation"
  ie: [mfa]
  ml: [remote-sensing]
  summary: "Use nighttime-light radiance — alone or fused with optical imagery by deep models — as a proxy for built-up volume and stocks."
  maturity: "Continent-scale proxy validated; deep fusion improves accuracy but still needs ground data for calibration."
  papers: [peledSpatialMaterialStock2021, baoDeepLearningFusion2023]
- id: street-view-building-attributes
  name: "Building attributes from street-level imagery"
  ie: [mfa]
  ml: [cv, segmentation]
  summary: "Predict floor area, age, and component counts (windows, doors) from street-view photos to feed urban stock models."
  maturity: "Feasibility shown (≈19% MAPE floor area, ~70% age accuracy in-city); transfer between cities degrades sharply."
  papers: [huangImageBasedPrediction2024, arbabiScalableDataCollection2021]
- id: interior-stock-prediction
  name: "Interior component stocks from exterior features"
  ie: [mfa, urban-mining]
  ml: [tabular-ml]
  summary: "Predict what's inside dwellings (pipes, radiators, wiring) from observable exterior features — a shortcut around impossible surveys."
  maturity: "Early single-country demonstrations; useful priors, wide uncertainty per building."
  papers: [daiModelingInteriorComponent2025]

# ── Waste, EoL & circularity ─────────────────────────────────────────────────
- id: label-ocr-identification
  name: "Product identification from labels (OCR + retrieval)"
  ie: [eol, urban-mining]
  ml: [cv, nlp-extraction]
  summary: "Read model/serial text off product labels and match it against a reference database to identify products at end-of-life."
  maturity: "Deployed in pilots; reads 95.7% of labels in repair settings but 39.7% at the recycler — label wear is the limit."
  papers: [sterkensProductLabelIdentification2023, koyanakaIndividualModelIdentification2024]
- id: waste-stream-classification
  name: "Waste image classification & detection"
  ie: [eol]
  ml: [cv]
  summary: "CNN/transformer classifiers recognize waste categories in images, from litter surveys to conveyor streams."
  maturity: "The most-published application in the field; lab accuracies are high, plant-condition performance is the honest test."
  papers: [luComputerVisionSolid2022, wuApplicationsConvolutionalNeural2023, majchrowskaDeepLearningbasedWaste2022]
- id: sorting-plant-characterization
  name: "Sensor-based material flow characterization in sorting plants"
  ie: [eol, mfa]
  ml: [cv, segmentation]
  summary: "Camera systems on sorting lines characterize the composition of waste flows continuously, feeding MFA with live plant data."
  maturity: "Running in operating plants for shredded WEEE; per-particle mass and less-common streams still open."
  papers: [vogelgesangAutomatedMaterialFlow2025, jiangBottomUpApproachIntegrating2025]
- id: component-detection
  name: "Component detection & counting in opened products"
  ie: [eol]
  ml: [cv, segmentation]
  summary: "Detect, segment, and count components inside opened devices to build bills of components for disassembly and recycling."
  maturity: "Well-validated where task-tuned; foundation segmenters (SAM) still need a class-assignment layer."
  papers: [zhangEvaluatingLargeLightweight2026, kirillovSegmentAnything2023]
  demo: "../demos/"
- id: zero-shot-eol-recognition
  name: "Zero-shot recognition with vision-language models"
  ie: [eol]
  ml: [cv, foundation]
  summary: "CLIP-class models score user-chosen labels against images — recognition without task-specific training data."
  maturity: "Works impressively in demos; measured MRF-condition evaluations show it's not yet sorting-grade."
  papers: [funkEvaluationVisionLanguage2026, radfordLearningTransferableVisual2021]
  demo: "../demos/"
- id: single-image-geometry
  name: "Geometry & quantity from single images"
  ie: [eol]
  ml: [depth, cv]
  summary: "Monocular depth and feed-forward 3D reconstruction recover error-bounded product geometry from ordinary photos."
  maturity: "Foundation depth models generalize well; reflective, transparent, and thin parts are the failure cases."
  papers: [yangDepthAnythingV22024]
  demo: "../demos/"
- id: robotic-disassembly
  name: "Vision-guided robotic disassembly"
  ie: [eol]
  ml: [cv, segmentation]
  summary: "Perception + planning pipelines locate fasteners and components to disassemble products robotically for reuse and recycling."
  maturity: "Working cells exist for narrow product families (phones); generalization across products is the open problem."
  papers: [ameurFutureRoboticDisassembly2025, liuRAISERobotAssistedSelective2025]
