<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="AI4IE">
  <rect width="32" height="32" rx="7" fill="#b5541e"/>
  <!-- The wordmark's Æ pivot glyph. Two-tone copper can't read on a copper
       square, so the "4 within the Æ" is done with opacity instead: the A's
       lower leg + the E's arms fade back, the 4 (stem + diagonal + crossbar)
       stays full white. -->
  <g fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11.6 18.4 L6.9 25.5 M19.5 6.5 L25.3 6.5 M19.5 25.5 L25.3 25.5" opacity="0.4"/>
    <path d="M19.5 6.5 L19.5 25.5 M19.5 6.5 L11.6 18.4 L24.2 18.4"/>
  </g>
</svg>
